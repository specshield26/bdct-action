  #         command: publish-consumer
  #         org: ${{ vars.SPECSHIELD_ORG }}
  #         consumer: checkout-ui
  #         provider: payment-service
  #         version: ${{ github.sha }}
  #         contract: ./contracts/payment-service.yaml
  #         format: OPENAPI
  #         api-token: ${{ secrets.SPECSHIELD_API_KEY }}
