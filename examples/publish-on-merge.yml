# Publish the latest provider spec on every push to main.
# Auto-verification re-runs all consumer contracts so the matrix is always current.
name: BDCT Publish

on:
  push:
    branches: [main]
    paths:
      - 'api/openapi.yaml'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish provider spec
        uses: specshield26/bdct-action@v1
        with:
          command: publish-provider
          org: ${{ vars.SPECSHIELD_ORG }}
          provider: payment-service
          version: ${{ github.sha }}
          spec: ./api/openapi.yaml
          env: production
          branch: main
          api-token: ${{ secrets.SPECSHIELD_API_KEY }}
          # cli-version is '3.2.1' by default; override only if you need a different release

  # Same pattern for a consumer team — uncomment if this repo owns a consumer contract:
